<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <title>Xvirus Cloud Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #08080f;
      --surface:   #10101c;
      --surface2:  #18182a;
      --border:    #2a2a42;
      --accent:    #5b6ef5;
      --accent2:   #7c3aed;
      --clean:     #22c55e;
      --threat:    #ef4444;
      --text:      #e2e2f0;
      --muted:     #7070a0;
      --radius:    14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ---- Header ---- */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo img {
      height: 48px;
      width: auto;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ---- Card ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    /* ---- Drop zone ---- */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(91, 110, 245, 0.06);
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #drop-zone .dz-icon { margin-bottom: 12px; }
    #drop-zone .dz-icon svg { width: 48px; height: 48px; opacity: 0.5; }
    #drop-zone .dz-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    #drop-zone .dz-sub {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ---- File preview ---- */
    #file-preview {
      display: none;
      align-items: center;
      gap: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 16px;
    }
    #file-preview svg { flex-shrink: 0; opacity: 0.7; }
    .file-info { flex: 1; min-width: 0; }
    .file-info .fname {
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-info .fsize {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }
    #remove-file {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      line-height: 0;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #remove-file:hover { color: var(--text); background: var(--border); }

    /* ---- Scan button ---- */
    #scan-btn {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    #scan-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #scan-btn:not(:disabled):hover { opacity: 0.88; }
    #scan-btn:not(:disabled):active { transform: scale(0.98); }

    /* ---- Spinner ---- */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Result ---- */
    #result {
      display: none;
      margin-top: 24px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 20px 16px;
    }
    .result-header svg { width: 44px; height: 44px; flex-shrink: 0; }
    .result-verdict { font-size: 1.15rem; font-weight: 700; }
    .result-sub { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

    #result.clean .result-header { background: rgba(34, 197, 94, 0.08); }
    #result.clean .result-verdict { color: var(--clean); }
    #result.threat .result-header { background: rgba(239, 68, 68, 0.08); }
    #result.threat .result-verdict { color: var(--threat); }

    .result-body {
      padding: 16px 20px 20px;
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      gap: 12px;
    }
    .result-row .label { color: var(--muted); flex-shrink: 0; }
    .result-row .value {
      font-weight: 500;
      text-align: right;
      word-break: break-all;
    }

    /* ---- Score bar ---- */
    .score-bar-wrap { display: flex; flex-direction: column; gap: 5px; }
    .score-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.83rem;
    }
    .score-labels .label { color: var(--muted); }
    .score-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    #result.clean  .score-fill { background: var(--clean); }
    #result.threat .score-fill { background: var(--threat); }

    /* ---- Error ---- */
    #error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      font-size: 0.85rem;
      color: #fca5a5;
    }

    /* ---- Vote buttons ---- */
    .vote-btns { display: flex; gap: 8px; }
    .vote-btn {
      padding: 4px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: background 0.15s;
      line-height: 1.6;
    }
    .vote-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #vote-allow { color: var(--clean); border-color: var(--clean); }
    #vote-allow:not(:disabled):hover { background: rgba(34,197,94,.1); }
    #vote-allow.confirmed { background: rgba(34,197,94,.18); }
    #vote-block { color: var(--threat); border-color: var(--threat); }
    #vote-block:not(:disabled):hover { background: rgba(239,68,68,.1); }
    #vote-block.confirmed { background: rgba(239,68,68,.18); }

    /* ---- Rescan button ---- */
    #rescan-btn {
      padding: 4px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      transition: background 0.15s;
      line-height: 1.6;
    }
    #rescan-btn:hover { background: rgba(91,110,245,.1); }

    /* ---- Footer ---- */
    footer {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    footer a { color: var(--muted); text-decoration: underline; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="/logo.png" alt="Xvirus">
  </div>
  <h1>Cloud Scanner</h1>
  <p>Upload a file to scan it for malware using the Xvirus engine</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" aria-label="Select a file to scan">
    <div class="dz-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 36v4a2 2 0 002 2h28a2 2 0 002-2v-4M16 18l8-8 8 8M24 10v22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="dz-title">Drag &amp; drop a file here</div>
    <div class="dz-sub">or click to browse &mdash; max 20 MB</div>
  </div>

  <!-- File preview -->
  <div id="file-preview">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="file-info">
      <div class="fname" id="preview-name"></div>
      <div class="fsize" id="preview-size"></div>
    </div>
    <button id="remove-file" aria-label="Remove file">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Error -->
  <div id="error-msg"></div>

  <!-- Scan button -->
  <button id="scan-btn" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L4 6v6c0 5.25 3.4 10.14 8 12 4.6-1.86 8-6.75 8-12V6l-8-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Scan File
  </button>

  <!-- Result -->
  <div id="result">
    <div class="result-header">
      <svg id="result-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
      <div>
        <div class="result-verdict" id="result-verdict"></div>
        <div class="result-sub" id="result-fname"></div>
      </div>
    </div>
    <div class="result-body">
      <div class="result-row" id="detection-row" style="display:none">
        <span class="label">Detection</span>
        <span class="value" id="result-detection"></span>
      </div>
      <div class="score-bar-wrap">
        <div class="score-labels">
          <span class="label">Malware score</span>
          <span class="value" id="score-pct"></span>
        </div>
        <div class="score-track">
          <div class="score-fill" id="score-fill" style="width:0%"></div>
        </div>
      </div>
      <div class="result-row">
        <span class="label">File size</span>
        <span class="value" id="result-size"></span>
      </div>
      <div class="result-row">
        <span class="label">MD5</span>
        <span class="value" id="result-md5" style="font-family:monospace;font-size:0.78rem"></span>
      </div>
      <div class="result-row" id="cached-row" style="display:none">
        <span class="label">Last scanned</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="value" id="result-scanned-at"></span>
          <button id="rescan-btn" style="display:none">Rescan</button>
        </div>
      </div>
      <div class="result-row">
        <span class="label">Community votes</span>
        <span class="value" id="result-votes"></span>
      </div>
      <div class="result-row">
        <span class="label">Your vote</span>
        <div class="vote-btns">
          <button class="vote-btn" id="vote-allow">Clean</button>
          <button class="vote-btn" id="vote-block">Malicious</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  Files are deleted immediately after scanning. &nbsp;|&nbsp;
  <a href="https://xvirus.net" target="_blank" rel="noopener">xvirus.net</a>
  &nbsp;|&nbsp;
  <a href="https://xvirus.net/submit" target="_blank" rel="noopener">Submit File or URL</a>
</footer>

<script>
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const filePreview= document.getElementById('file-preview');
  const previewName= document.getElementById('preview-name');
  const previewSize= document.getElementById('preview-size');
  const removeBtn  = document.getElementById('remove-file');
  const scanBtn    = document.getElementById('scan-btn');
  const errorMsg   = document.getElementById('error-msg');
  const result     = document.getElementById('result');

  let selectedFile = null;
  let currentMd5 = null;

  function relativeTime(date) {
    const diff = Math.floor((Date.now() - new Date(date)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
    if (diff < 86400) return Math.floor(diff / 3600) + ' hr ago';
    return Math.floor(diff / 86400) + ' days ago';
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(2) + ' MB';
  }

  function setFile(file) {
    if (!file) return;
    selectedFile = file;
    previewName.textContent = file.name;
    previewSize.textContent = formatBytes(file.size);
    filePreview.style.display = 'flex';
    scanBtn.disabled = false;
    hideResult();
    hideError();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    filePreview.style.display = 'none';
    scanBtn.disabled = true;
    hideResult();
    hideError();
  }

  function hideResult() {
    result.style.display = 'none';
    result.className = '';
  }

  function hideError() {
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    hideResult();
  }

  // Drag & drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', clearFile);

  const scanBtnIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
    <path d="M12 2L4 6v6c0 5.25 3.4 10.14 8 12 4.6-1.86 8-6.75 8-12V6l-8-4z"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg> Scan File`;

  async function doScan(force = false) {
    if (!selectedFile) return;
    hideError();
    hideResult();

    scanBtn.disabled = true;
    scanBtn.innerHTML = '<div class="spinner"></div> Scanning&hellip;';

    const fd = new FormData();
    fd.append('file', selectedFile);

    try {
      const url = force ? '/api/scan?force=true' : '/api/scan';
      const resp = await fetch(url, { method: 'POST', body: fd });
      const data = await resp.json();

      if (!resp.ok) {
        showError(data.error || 'Scan request failed.');
        return;
      }

      showResult(data);
    } catch (err) {
      showError('Network error — could not reach the scanner.');
    } finally {
      scanBtn.disabled = false;
      scanBtn.innerHTML = scanBtnIcon;
    }
  }

  // Scan
  scanBtn.addEventListener('click', () => doScan());
  document.getElementById('rescan-btn').addEventListener('click', () => doScan(true));

  function showResult(data) {
    const isMalware = data.isMalware;
    const score = Math.round(data.malwareScore * 100);

    result.style.display = 'block';
    result.className = isMalware ? 'threat' : 'clean';

    const icon = document.getElementById('result-icon');
    if (isMalware) {
      icon.innerHTML = `
        <circle cx="22" cy="22" r="20" fill="rgba(239,68,68,0.15)"/>
        <path d="M22 6L8 12v8c0 8 5.6 15.5 14 17.5C30.4 35.5 36 28 36 20v-8L22 6z" fill="#ef4444" opacity="0.9"/>
        <path d="M16 22l4 4 8-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0" />
        <path d="M17 17l10 10M27 17L17 27" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>`;
    } else {
      icon.innerHTML = `
        <circle cx="22" cy="22" r="20" fill="rgba(34,197,94,0.12)"/>
        <path d="M22 6L8 12v8c0 8 5.6 15.5 14 17.5C30.4 35.5 36 28 36 20v-8L22 6z" fill="#22c55e" opacity="0.9"/>
        <path d="M15 22l5 5 9-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    }

    document.getElementById('result-verdict').textContent = isMalware ? 'Threat Detected' : 'File is Clean';
    document.getElementById('result-fname').textContent = data.fileName;

    const detRow = document.getElementById('detection-row');
    if (isMalware && data.name) {
      document.getElementById('result-detection').textContent = data.name;
      detRow.style.display = 'flex';
    } else {
      detRow.style.display = 'none';
    }

    document.getElementById('score-pct').textContent = score + '%';
    requestAnimationFrame(() => {
      document.getElementById('score-fill').style.width = score + '%';
    });

    document.getElementById('result-size').textContent = formatBytes(data.fileSize);
    document.getElementById('result-md5').textContent = data.md5 ?? '—';
    const allow = data.votes?.allow ?? 0;
    const block = data.votes?.block ?? 0;
    document.getElementById('result-votes').textContent =
      allow + block === 0 ? 'No votes yet' : `${allow} clean · ${block} malicious`;

    // Cached result notice
    const cachedRow = document.getElementById('cached-row');
    const rescanBtn = document.getElementById('rescan-btn');
    if (data.cached && data.scannedAt) {
      document.getElementById('result-scanned-at').textContent = relativeTime(data.scannedAt);
      rescanBtn.style.display = data.canRescan ? 'inline-block' : 'none';
      cachedRow.style.display = 'flex';
    } else {
      cachedRow.style.display = 'none';
      rescanBtn.style.display = 'none';
    }

    // Vote buttons — disable while we ask the server if this IP already voted
    currentMd5 = data.md5 ?? null;
    const vAllow = document.getElementById('vote-allow');
    const vBlock = document.getElementById('vote-block');
    vAllow.disabled = true;
    vAllow.className = 'vote-btn';
    vBlock.disabled = true;
    vBlock.className = 'vote-btn';
    if (currentMd5) checkVoteStatus(currentMd5);
  }

  async function checkVoteStatus(hash) {
    try {
      const resp = await fetch('/api/vote/' + hash);
      if (!resp.ok) throw new Error();
      const data = await resp.json();
      if (data.voted) {
        markVoted(data.vote);
      } else {
        document.getElementById('vote-allow').disabled = false;
        document.getElementById('vote-block').disabled = false;
      }
    } catch {
      // On network error enable buttons optimistically
      document.getElementById('vote-allow').disabled = false;
      document.getElementById('vote-block').disabled = false;
    }
  }

  function markVoted(vote) {
    const vAllow = document.getElementById('vote-allow');
    const vBlock = document.getElementById('vote-block');
    vAllow.disabled = true;
    vBlock.disabled = true;
    if (vote === 'allow') vAllow.classList.add('confirmed');
    else vBlock.classList.add('confirmed');
  }

  async function submitVote(vote) {
    if (!currentMd5) return;
    const vAllow = document.getElementById('vote-allow');
    const vBlock = document.getElementById('vote-block');
    vAllow.disabled = true;
    vBlock.disabled = true;
    try {
      const resp = await fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hash: currentMd5, vote }),
      });
      const data = await resp.json();
      if (resp.ok || resp.status === 409) {
        markVoted(vote);
      }
      if (resp.ok) {
        const a = data.allow ?? 0, b = data.block ?? 0;
        document.getElementById('result-votes').textContent =
          a + b === 0 ? 'No votes yet' : `${a} clean · ${b} malicious`;
      }
    } catch {
      vAllow.disabled = false;
      vBlock.disabled = false;
    }
  }

  document.getElementById('vote-allow').addEventListener('click', () => submitVote('allow'));
  document.getElementById('vote-block').addEventListener('click', () => submitVote('block'));
</script>
</body>
</html>
