name: Publish XvirusSDK Release

on:
  push:
    tags:
      - 'XvirusSDK_*'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-windows:
    name: Build Windows Artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#XvirusSDK_}" >> "$GITHUB_OUTPUT"

      - name: Pack CSharpSDK (NuGet)
        run: >
          dotnet pack CSharpSDK/CSharpSDK.csproj
          -c Release
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o dist/nuget

      - name: Publish CSharpSDK
        run: >
          dotnet publish CSharpSDK/CSharpSDK.csproj
          -c Release
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o dist/CSharpSDK

      - name: Copy CSharpSDK example
        shell: pwsh
        run: Copy-Item -Recurse -Path "CSharpSDK/example" -Destination "dist/CSharpSDK/example"

      - name: Publish NativeSDK (win-x64)
        run: >
          dotnet publish NativeSDK/NativeSDK.csproj
          -c Release -r win-x64
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o dist/NativeSDK-Windows

      - name: Copy NativeSDK example (Windows)
        shell: pwsh
        run: Copy-Item -Recurse -Path "NativeSDK/example" -Destination "dist/NativeSDK-Windows/example"

      - name: Publish NodeSDK (win-x64)
        run: >
          dotnet publish NodeSDK/NodeSDK.csproj
          -c Release -r win-x64
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o dist/NodeSDK-Windows

      - name: Copy NodeSDK example (Windows)
        shell: pwsh
        run: Copy-Item -Recurse -Path "NodeSDK/example" -Destination "dist/NodeSDK-Windows/example"

      - name: Publish XvirusCLI (win-x64)
        run: >
          dotnet publish XvirusCLI/XvirusCLI.csproj
          -c Release -r win-x64 --self-contained true
          /p:Version=${{ steps.version.outputs.VERSION }}
          -o dist/XvirusCLI-Windows

      - name: Zip artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/CSharpSDK/*"         -DestinationPath "CSharpSDK.zip"
          Compress-Archive -Path "dist/NativeSDK-Windows/*" -DestinationPath "NativeSDK-Windows.zip"
          Compress-Archive -Path "dist/NodeSDK-Windows/*"   -DestinationPath "NodeSDK-Windows.zip"
          Compress-Archive -Path "dist/XvirusCLI-Windows/*" -DestinationPath "XvirusCLI-Windows.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            CSharpSDK.zip
            NativeSDK-Windows.zip
            NodeSDK-Windows.zip
            XvirusCLI-Windows.zip
            dist/nuget/*.nupkg
          if-no-files-found: error
          retention-days: 1

  build-linux-glibc:
    name: Build Linux glibc Artifacts (Ubuntu 16.04 / glibc 2.23)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#XvirusSDK_}" >> "$GITHUB_OUTPUT"

      - name: Build inside Ubuntu 16.04 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:16.04 \
            bash -c "
              set -e
              apt-get update -q
              apt-get install -y curl wget git zip ca-certificates gnupg software-properties-common
              wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
              echo 'deb http://apt.llvm.org/xenial/ llvm-toolchain-xenial-9 main' \
                >> /etc/apt/sources.list.d/llvm.list
              apt-get update -q
              apt-get install -y clang-9 zlib1g-dev
              ln -sf /usr/bin/clang-9 /usr/bin/clang

              curl -fsSL https://dot.net/v1/dotnet-install.sh \
                | bash -s -- --channel 8.0 --install-dir /opt/dotnet

              /opt/dotnet/dotnet publish NativeSDK/NativeSDK.csproj \
                -c Release -r linux-x64 \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/NativeSDK-Linux-glibc
              cp -r NativeSDK/example dist/NativeSDK-Linux-glibc/example

              /opt/dotnet/dotnet publish NodeSDK/NodeSDK.csproj \
                -c Release -r linux-x64 \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/NodeSDK-Linux-glibc
              cp -r NodeSDK/example dist/NodeSDK-Linux-glibc/example

              /opt/dotnet/dotnet publish XvirusCLI/XvirusCLI.csproj \
                -c Release -r linux-x64 --self-contained true \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/XvirusCLI-Linux-glibc

              find dist -name '*.dbg' -delete

              (cd dist/NativeSDK-Linux-glibc && zip -r /workspace/NativeSDK-Linux-glibc.zip .)
              (cd dist/NodeSDK-Linux-glibc   && zip -r /workspace/NodeSDK-Linux-glibc.zip .)
              (cd dist/XvirusCLI-Linux-glibc && zip -r /workspace/XvirusCLI-Linux-glibc.zip .)
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-glibc-artifacts
          path: |
            NativeSDK-Linux-glibc.zip
            NodeSDK-Linux-glibc.zip
            XvirusCLI-Linux-glibc.zip
          if-no-files-found: error
          retention-days: 1

  build-linux-musl:
    name: Build Linux musl Artifacts (Alpine 3.13 / musl 1.2.2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#XvirusSDK_}" >> "$GITHUB_OUTPUT"

      - name: Build inside Alpine 3.13 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:3.13 \
            sh -c "
              set -e
              apk add --no-cache bash curl git zip clang build-base zlib-dev icu-libs openssl-dev

              curl -fsSL https://dot.net/v1/dotnet-install.sh \
                | bash -s -- --channel 8.0 --install-dir /opt/dotnet

              /opt/dotnet/dotnet publish NativeSDK/NativeSDK.csproj \
                -c Release -r linux-musl-x64 \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/NativeSDK-Linux-musl
              cp -r NativeSDK/example dist/NativeSDK-Linux-musl/example

              /opt/dotnet/dotnet publish NodeSDK/NodeSDK.csproj \
                -c Release -r linux-musl-x64 \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/NodeSDK-Linux-musl
              cp -r NodeSDK/example dist/NodeSDK-Linux-musl/example

              /opt/dotnet/dotnet publish XvirusCLI/XvirusCLI.csproj \
                -c Release -r linux-musl-x64 --self-contained true \
                /p:Version=${{ steps.version.outputs.VERSION }} \
                -o dist/XvirusCLI-Linux-musl

              find dist -name '*.dbg' -delete

              (cd dist/NativeSDK-Linux-musl && zip -r /workspace/NativeSDK-Linux-musl.zip .)
              (cd dist/NodeSDK-Linux-musl   && zip -r /workspace/NodeSDK-Linux-musl.zip .)
              (cd dist/XvirusCLI-Linux-musl && zip -r /workspace/XvirusCLI-Linux-musl.zip .)
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-musl-artifacts
          path: |
            NativeSDK-Linux-musl.zip
            NodeSDK-Linux-musl.zip
            XvirusCLI-Linux-musl.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux-glibc, build-linux-musl]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#XvirusSDK_}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: XvirusSDK ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: release-assets/*
          body: |
            ## XvirusSDK ${{ steps.version.outputs.VERSION }}

            See the [Changelog](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for what's new in this release.

            ### Release Assets

            | Asset | Platform | Description |
            |-------|----------|-------------|
            | `XvirusSDK.${{ steps.version.outputs.VERSION }}.nupkg` | Any | C# NuGet package |
            | `CSharpSDK.zip` | Any | C# SDK managed library + example |
            | `NativeSDK-Windows.zip` | Windows x64 | Native AOT shared library + example |
            | `NativeSDK-Linux-glibc.zip` | Linux x64 (glibc ≥ 2.23) | Native AOT shared library + example |
            | `NativeSDK-Linux-musl.zip` | Linux x64 (musl ≥ 1.2.2) | Native AOT shared library + example |
            | `NodeSDK-Windows.zip` | Windows x64 | Node.js native addon (.cjs / .mjs / .d.ts) + example |
            | `NodeSDK-Linux-glibc.zip` | Linux x64 (glibc ≥ 2.23) | Node.js native addon + example |
            | `NodeSDK-Linux-musl.zip` | Linux x64 (musl ≥ 1.2.2) | Node.js native addon + example |
            | `XvirusCLI-Windows.zip` | Windows x64 | CLI tool (self-contained) |
            | `XvirusCLI-Linux-glibc.zip` | Linux x64 (glibc ≥ 2.23) | CLI tool (self-contained) |
            | `XvirusCLI-Linux-musl.zip` | Linux x64 (musl ≥ 1.2.2) | CLI tool (self-contained) |
